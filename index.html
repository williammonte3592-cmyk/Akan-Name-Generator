<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akan Name Generator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <h1>Akan Name Generator</h1>
    
    <form id="akanForm">
      <div class="form-group">
        <label for="name">Your Current Name</label>
        <input type="text" id="name" placeholder="e.g. John" required>
      </div>

      <div class="form-group">
        <label for="gender">Gender</label>
        <select id="gender" required>
          <option value="" disabled selected>Select gender</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
      </div>

      <div class="form-group">
        <label for="day">Day of Birth</label>
        <input type="number" id="day" min="1" max="31" placeholder="1-31" required>
      </div>

      <div class="form-group">
        <label for="month">Month of Birth</label>
        <select id="month" required>
          <option value="" disabled selected>Select month</option>
          <option value="0">January</option>
          <option value="1">February</option>
          <option value="2">March</option>
          <option value="3">April</option>
          <option value="4">May</option>
          <option value="5">June</option>
          <option value="6">July</option>
          <option value="7">August</option>
          <option value="8">September</option>
          <option value="9">October</option>
          <option value="10">November</option>
          <option value="11">December</option>
        </select>
      </div>

      <div class="form-group">
        <label for="year">Year of Birth</label>
        <input type="number" id="year" placeholder="e.g. 1990" required>
      </div>

      <button type="submit">Generate Name</button>
    </form>

    <div id="result"></div>
  </div>
  <footer>
    <p>&; 2024 Akan Name Generator. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
